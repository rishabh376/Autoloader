name: Run naukri-autosaver

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      run_duration_minutes:
        description: 'How many minutes should the bot run (default 90)'
        required: false
        default: '90'
  schedule:
    # Times listed in IST (UTC+5:30); converted to UTC for cron
    # Morning 09:00 IST -> 03:30 UTC
    - cron: '30 3 * * *'
    # Noon 11:15 IST -> 05:45 UTC
    - cron: '45 5 * * *'
    # Afternoon 15:00 IST -> 09:30 UTC
    - cron: '30 9 * * *'
    # Evening 18:00 IST -> 12:30 UTC
    - cron: '30 12 * * *'

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run naukri-autosaver
        timeout-minutes: 90
        env:
          RUN_DURATION: ${{ github.event.inputs.run_duration_minutes || '90' }}
          NAUKRI_EMAIL: ${{ secrets.NAUKRI_EMAIL }}
          NAUKRI_PASSWORD: ${{ secrets.NAUKRI_PASSWORD }}
        run: |
          # optionally create a .env file for the script without printing secrets
          printf 'NAUKRI_EMAIL="%s"\nNAUKRI_PASSWORD="%s"\nRUN_DURATION="%s"\n' "${{ secrets.NAUKRI_EMAIL }}" "${{ secrets.NAUKRI_PASSWORD }}" "$RUN_DURATION" > .env
          echo "Run duration: $RUN_DURATION minutes"
          python naukri-autosaver.py
